<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Challenging Negative Automatic Thoughts – ChatCBT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #f2f8f4;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .page-header {
    background: #0d4a2e;
    padding: 36px 24px 30px;
    text-align: center;
  }
  .page-header h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #ffffff !important;
    margin-bottom: 10px;
  }
  .page-header p {
    font-size: 0.97rem;
    color: #c8e6d4 !important;
    max-width: 660px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .container {
    max-width: 820px;
    margin: 32px auto;
    padding: 0 20px 72px;
  }

  .info-box {
    background: #ffffff;
    border-left: 5px solid #0d4a2e;
    border-radius: 0 10px 10px 0;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .info-box h2 {
    font-size: 0.95rem;
    font-weight: 700;
    color: #0d4a2e;
    margin-bottom: 8px;
  }

  .info-box p {
    font-size: 0.88rem;
    line-height: 1.75;
    color: #444;
  }

  .card {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 14px rgba(13,74,46,0.08);
    margin-bottom: 22px;
    overflow: hidden;
  }

  .section-header {
    background: #0d4a2e;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-header .badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-weight: 700;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .section-header span {
    color: #fff;
    font-weight: 700;
  }

  .section-body { padding: 22px 24px; }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #0d4a2e;
    margin-bottom: 6px;
  }

  textarea, input[type="date"] {
    width: 100%;
    border: 1.5px solid #c5dfd0;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.88rem;
    background: #f7fdf9;
  }

  textarea { min-height: 100px; resize: vertical; }

  .slider-row {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  input[type="range"] {
    flex: 1;
    accent-color: #0d4a2e;
  }

  .rating-pill {
    background: #0d4a2e;
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    min-width: 54px;
    text-align: center;
  }

  .submit-btn {
    width: 100%;
    background: #0d4a2e;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
  }

  .pattern-chip {
    border: 2px solid #c5dfd0;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    background: #f7fdf9;
    margin-bottom: 8px;
  }

  .pattern-chip.selected {
    background: #e2f2ea;
    border-color: #0d4a2e;
  }

  .hidden { display: none; }

</style>
</head>

<body>

<div class="page-header">
  <h1>Identifying &amp; Challenging NAITs</h1>
  <p>Learn to spot and reframe negative automatic thoughts.</p>
</div>

<div class="container">

<form name="naits-worksheet" method="POST" data-netlify="true">

  <input type="hidden" name="form-name" value="naits-worksheet"/>

  <!-- SECTION 1 -->
  <div class="card">
    <div class="section-header">
      <div class="badge">1</div><span>The Event</span>
    </div>
    <div class="section-body">
      <label>Date</label>
      <input type="date" name="date"/>

      <label>What happened?</label>
      <textarea name="situation"></textarea>
    </div>
  </div>

  <!-- SECTION 2 -->
  <div class="card">
    <div class="section-header">
      <div class="badge">2</div><span>Thoughts</span>
    </div>
    <div class="section-body">
      <label>Automatic thoughts</label>
      <textarea name="thoughts"></textarea>

      <label>Belief strength</label>
      <div class="slider-row">
        <input type="range" id="beliefBefore" name="belief_before" min="0" max="100" value="70"/>
        <div class="rating-pill" id="beliefBeforeDisplay">70%</div>
      </div>
    </div>
  </div>

  <!-- SECTION 3 -->
  <div class="card">
    <div class="section-header">
      <div class="badge">3</div><span>Distortions</span>
    </div>
    <div class="section-body">

      <div class="pattern-chip" data-value="Catastrophising">Catastrophising</div>
      <div class="pattern-chip" data-value="Black or white thinking">Black or white thinking</div>
      <div class="pattern-chip" data-value="Personalising">Personalising</div>

      <input type="hidden" name="patterns" id="patternsInput"/>

    </div>
  </div>

  <!-- SECTION 4 -->
  <div class="card">
    <div class="section-header">
      <div class="badge">4</div><span>Feelings</span>
    </div>
    <div class="section-body">
      <label>Emotions</label>
      <textarea name="emotions"></textarea>
    </div>
  </div>

  <!-- SECTION 5 -->
  <div class="card">
    <div class="section-header">
      <div class="badge">5</div><span>Challenge</span>
    </div>
    <div class="section-body">
      <label>Challenge thoughts</label>
      <textarea name="challenges"></textarea>
    </div>
  </div>

  <!-- SECTION 6 -->
  <div class="card">
    <div class="section-header">
      <div class="badge">6</div><span>Reframe</span>
    </div>
    <div class="section-body">
      <label>Balanced thought</label>
      <textarea name="rational_thought"></textarea>
    </div>
  </div>

  <button class="submit-btn" type="submit">Submit Worksheet</button>

</form>

</div>

<script>
  /* sliders */
  const belief = document.getElementById("beliefBefore");
  const display = document.getElementById("beliefBeforeDisplay");

  belief.addEventListener("input", () => {
    display.textContent = belief.value + "%";
  });

  /* pattern chips */
  const chips = document.querySelectorAll(".pattern-chip");
  const hidden = document.getElementById("patternsInput");

  chips.forEach(chip => {
    chip.addEventListener("click", () => {
      chip.classList.toggle("selected");
      update();
    });
  });

  function update() {
    const selected = [...document.querySelectorAll(".pattern-chip.selected")]
      .map(c => c.dataset.value);
    hidden.value = selected.join(", ");
  }
</script>

</body>
</html>
