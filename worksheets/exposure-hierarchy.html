<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exposure Hierarchy — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

textarea {
  min-height: 90px;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.section {
  margin-bottom: 18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🪜 Exposure Hierarchy</h1>

<p>
Build a step-by-step ladder to face fears gradually, starting small and working upwards.
</p>

<div class="section">
  <label>What is the fear or situation you want to work on?</label>
  <textarea id="fear" placeholder="Describe the situation you avoid or feel anxious about"></textarea>
</div>

<div class="section">
  <label>Why does this feel difficult?</label>
  <textarea id="reason" placeholder="What makes this feel threatening or uncomfortable?"></textarea>
</div>

<div class="section">
  <label>Step 1 (easiest exposure)</label>
  <textarea id="step1" placeholder="Very small, manageable version of the fear"></textarea>
</div>

<div class="section">
  <label>Step 2</label>
  <textarea id="step2" placeholder="Slightly more challenging step"></textarea>
</div>

<div class="section">
  <label>Step 3</label>
  <textarea id="step3" placeholder="Moderate difficulty step"></textarea>
</div>

<div class="section">
  <label>Step 4</label>
  <textarea id="step4" placeholder="Harder step"></textarea>
</div>

<div class="section">
  <label>Step 5 (final goal exposure)</label>
  <textarea id="step5" placeholder="Full exposure to the feared situation"></textarea>
</div>

<div class="section">
  <label>How will you support yourself through this?</label>
  <textarea id="support" placeholder="Coping strategies, self-talk, safety behaviours to reduce or remove"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Exposure Hierarchy",
    date: new Date().toISOString(),

    fear: document.getElementById('fear').value,
    reason: document.getElementById('reason').value,
    step1: document.getElementById('step1').value,
    step2: document.getElementById('step2').value,
    step3: document.getElementById('step3').value,
    step4: document.getElementById('step4').value,
    step5: document.getElementById('step5').value,
    support: document.getElementById('support').value
  };
saveToServer(data);
  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>
<script src="/js/save.js"></script>
</body>
</html>
