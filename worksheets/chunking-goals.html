<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chunking Goals — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

textarea {
  min-height: 90px;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.section {
  margin-bottom: 18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 Chunking Goals</h1>

<p>
Break overwhelming goals into small, manageable steps so progress feels possible again.
</p>

<div class="section">
  <label>Main goal</label>
  <textarea id="goal" placeholder="What are you trying to achieve?"></textarea>
</div>

<div class="section">
  <label>Why this matters</label>
  <textarea id="why" placeholder="Why is this important to you?"></textarea>
</div>

<div class="section">
  <label>Smallest first step</label>
  <textarea id="step1" placeholder="What is the tiniest possible action you could take?"></textarea>
</div>

<div class="section">
  <label>Next 3 steps</label>
  <textarea id="steps" placeholder="Break it down into 3 more small steps..."></textarea>
</div>

<div class="section">
  <label>Possible obstacles</label>
  <textarea id="obstacles" placeholder="What might get in the way?"></textarea>
</div>

<div class="section">
  <label>How you’ll overcome them</label>
  <textarea id="solutions" placeholder="What could help you stay on track?"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Chunking Goals",
    date: new Date().toISOString(),

    goal: document.getElementById('goal').value,
    why: document.getElementById('why').value,
    step1: document.getElementById('step1').value,
    steps: document.getElementById('steps').value,
    obstacles: document.getElementById('obstacles').value,
    solutions: document.getElementById('solutions').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
