<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Worry Diary — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

textarea, input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
  box-sizing: border-box;
}

textarea {
  min-height: 90px;
}

textarea:focus, input:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.card {
  background: #ffffff;
  border: 1px solid #c5dfd0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.card h3 {
  margin: 0 0 6px;
  color: #0d4a2e;
  font-size: 1rem;
}

.card p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 Worry Diary</h1>

<p>
Capture worries, separate facts from predictions, and reduce repetitive rumination by externalising and organising your thoughts.
</p>

<div class="section">
  <label>Date</label>
  <input type="date" id="date"/>
</div>

<div class="section">
  <label>What are you worrying about?</label>
  <textarea id="worry" placeholder="Describe the worry in full"></textarea>
</div>

<div class="section">
  <label>What triggered this worry?</label>
  <textarea id="trigger" placeholder="Situation, thought, or feeling"></textarea>
</div>

<div class="section">
  <label>What is the worst-case scenario your mind is imagining?</label>
  <textarea id="worst" placeholder="Be specific"></textarea>
</div>

<div class="section">
  <label>How likely is this actually to happen? (0–100%)</label>
  <input type="number" id="likelihood" min="0" max="100" placeholder="e.g. 20"/>
</div>

<div class="section">
  <label>If it did happen, how would you cope?</label>
  <textarea id="cope" placeholder="Resources, actions, support"></textarea>
</div>

<div class="section">
  <label>What is a more balanced or realistic perspective?</label>
  <textarea id="balanced" placeholder="Alternative interpretation"></textarea>
</div>

<div class="section">
  <label>Can you do anything about this worry right now?</label>
  <textarea id="action" placeholder="Yes / No + what action if any"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Worry Diary",
    date: new Date().toISOString(),

    entryDate: document.getElementById('date').value,
    worry: document.getElementById('worry').value,
    trigger: document.getElementById('trigger').value,
    worst: document.getElementById('worst').value,
    likelihood: document.getElementById('likelihood').value,
    cope: document.getElementById('cope').value,
    balanced: document.getElementById('balanced').value,
    action: document.getElementById('action').value
  };
saveToServer(data);
  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>
<script src="/js/save.js"></script>
</body>
</html>
