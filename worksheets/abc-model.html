<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABC Model Worksheet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
  body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: #f6f8fb;
    color: #1f2937;
  }

  header {
    background: #1a5c3a;
    color: white;
    padding: 24px;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 1.8rem;
  }

  header p {
    margin: 6px 0 0;
    opacity: 0.9;
    font-size: 0.95rem;
  }

  .container {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 20px;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  }

  label {
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 90px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 0.95rem;
    resize: vertical;
  }

  button {
    background: #1a5c3a;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    margin-right: 10px;
    margin-top: 10px;
  }

  button:hover {
    background: #14452c;
  }

  .entries {
    margin-top: 20px;
  }

  .entry {
    background: #f9fafb;
    border-left: 4px solid #1a5c3a;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
  }

  .entry small {
    color: #6b7280;
    display: block;
    margin-bottom: 6px;
  }

  footer {
    text-align: center;
    padding: 30px;
    font-size: 0.85rem;
    color: #6b7280;
  }
</style>
</head>

<body>

<header>
  <h1>The ABC Model Worksheet</h1>
  <p>Track Activating Events, Beliefs, and Consequences in real time</p>
</header>

<div class="container">

  <div class="card">
    <label for="activating">A — Activating Event</label>
    <textarea id="activating" placeholder="What happened? Describe the situation..."></textarea>
  </div>

  <div class="card">
    <label for="beliefs">B — Beliefs / Thoughts</label>
    <textarea id="beliefs" placeholder="What went through your mind? What did you tell yourself?"></textarea>
  </div>

  <div class="card">
    <label for="consequences">C — Consequences</label>
    <textarea id="consequences" placeholder="How did you feel? What did you do?"></textarea>
  </div>

  <button onclick="saveEntry()">Save Entry</button>
  <button onclick="clearFields()">Clear</button>
  <button onclick="clearAll()">Clear All Saved</button>

  <div class="entries" id="entries"></div>

</div>

<footer>
  ABC Model Tool • Built for reflection and CBT-style thought tracking
</footer>

<script>
function saveEntry() {
  const a = document.getElementById("activating").value;
  const b = document.getElementById("beliefs").value;
  const c = document.getElementById("consequences").value;

  if (!a && !b && !c) return;

  const entry = {
    a, b, c,
    time: new Date().toLocaleString()
  };

  let entries = JSON.parse(localStorage.getItem("abcEntries") || "[]");
  entries.unshift(entry);
  localStorage.setItem("abcEntries", JSON.stringify(entries));

  renderEntries();
  clearFields();
}

function clearFields() {
  document.getElementById("activating").value = "";
  document.getElementById("beliefs").value = "";
  document.getElementById("consequences").value = "";
}

function clearAll() {
  localStorage.removeItem("abcEntries");
  renderEntries();
}

function renderEntries() {
  const container = document.getElementById("entries");
  const entries = JSON.parse(localStorage.getItem("abcEntries") || "[]");

  container.innerHTML = "";

  entries.forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <small>${e.time}</small>
      <strong>A:</strong> ${e.a || "-"}<br/>
      <strong>B:</strong> ${e.b || "-"}<br/>
      <strong>C:</strong> ${e.c || "-"}
    `;

    container.appendChild(div);
  });
}

renderEntries();
</script>

</body>
</html>
