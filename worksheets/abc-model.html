<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABC Model — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

/* Simple clean container */
.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

/* Button */
.submit-btn {
  display: block;
  width: 100%;
  background: #0d4a2e;
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
}

.submit-btn:hover {
  background: #0a3a22;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 ABC Model</h1>

<p>Work through the situation, your thoughts, and your responses.</p>

<textarea id="abcSituation" placeholder="What happened?" style="width:100%;margin-bottom:10px;"></textarea>

<textarea id="abcThoughts" placeholder="What were your thoughts?" style="width:100%;margin-bottom:10px;"></textarea>

<textarea id="abcFeelings" placeholder="How did you feel?" style="width:100%;margin-bottom:10px;"></textarea>

<textarea id="abcNewBelief" placeholder="New balanced thought" style="width:100%;margin-bottom:20px;"></textarea>

<button class="submit-btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "ABC Model",
    date: new Date().toISOString(),

    situation: document.getElementById('abcSituation').value,
    thoughts: document.getElementById('abcThoughts').value,
    feelings: document.getElementById('abcEmotions').value,
    newBelief: document.getElementById('abcNewBelief').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
