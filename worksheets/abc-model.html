<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The ABC Model — ChatCBT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #f2f8f4;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .page-header {
    background: #0d4a2e;
    padding: 36px 24px 30px;
    text-align: center;
  }
  .page-header h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #ffffff !important;
    margin-bottom: 10px;
  }
  .page-header p {
    font-size: 0.97rem;
    color: #c8e6d4 !important;
    max-width: 660px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .container {
    max-width: 820px;
    margin: 32px auto;
    padding: 0 20px 72px;
  }

  .info-box {
    background: #ffffff;
    border-left: 5px solid #0d4a2e;
    border-radius: 0 10px 10px 0;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .info-box h2 {
    font-size: 0.95rem;
    font-weight: 700;
    color: #0d4a2e;
    margin-bottom: 8px;
  }

  .info-box p {
    font-size: 0.88rem;
    line-height: 1.75;
    color: #444;
  }

  .abc-flow {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }

  .flow-step {
    background: #0d4a2e;
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    flex: 1;
    max-width: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .flow-letter {
    font-size: 1.6rem;
    font-weight: 800;
    color: #fff;
  }

  .flow-name {
    font-size: 0.62rem;
    color: #c8e6d4;
    margin-top: 5px;
  }

  .flow-arrow {
    color: #0d4a2e;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    padding: 0 5px;
  }

  .card {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 14px rgba(13,74,46,0.08);
    margin-bottom: 22px;
    overflow: hidden;
  }

  .section-header {
    background: #0d4a2e;
    padding: 14px 22px;
    display: flex;
    gap: 12px;
  }

  .badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-weight: 800;
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .section-header span {
    color: #fff;
    font-weight: 700;
  }

  .section-body { padding: 22px 24px; }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #0d4a2e;
    margin-bottom: 6px;
  }

  textarea, input, select {
    width: 100%;
    border: 1.5px solid #c5dfd0;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Poppins';
    font-size: 0.88rem;
    background: #f7fdf9;
  }

  textarea { min-height: 100px; }

  .submit-btn {
    display: block;
    width: 100%;
    background: #0d4a2e;
    color: #fff;
    font-weight: 700;
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    border: none;
    margin-top: 12px;
  }

  .submit-btn:hover { background: #0a3a22; }

  .saved {
    margin-top: 30px;
  }

  .saved h3 {
    font-size: 0.9rem;
    color: #0d4a2e;
    margin-bottom: 10px;
  }

  .entry {
    background: #fff;
    border-left: 4px solid #0d4a2e;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 0.85rem;
  }
</style>
</head>

<body>

<div class="page-header">
  <h1>The ABC Model — Thought Diary</h1>
  <p>Track thoughts, beliefs, and emotional consequences in real time.</p>
</div>

<div class="container">

  <!-- A -->
  <div class="card">
    <div class="section-header"><div class="badge">A</div><span>Activating Event</span></div>
    <div class="section-body">
      <label>Date</label>
      <input type="date" id="date">

      <label>Situation</label>
      <textarea id="situation"></textarea>
    </div>
  </div>

  <!-- B -->
  <div class="card">
    <div class="section-header"><div class="badge">B</div><span>Beliefs</span></div>
    <div class="section-body">
      <label>Thoughts</label>
      <textarea id="thoughts"></textarea>

      <label>Hot Thought</label>
      <input type="text" id="hotThought">
    </div>
  </div>

  <!-- C -->
  <div class="card">
    <div class="section-header"><div class="badge">C</div><span>Consequences</span></div>
    <div class="section-body">
      <label>Emotions</label>
      <textarea id="emotions"></textarea>
    </div>
  </div>

  <button class="submit-btn" onclick="saveEntry()">Save Worksheet</button>

  <div class="saved">
    <h3>Saved entries</h3>
    <div id="entries"></div>
  </div>

</div>

<script>
function saveEntry() {
  const entry = {
    date: document.getElementById("date").value,
    situation: document.getElementById("situation").value,
    thoughts: document.getElementById("thoughts").value,
    hotThought: document.getElementById("hotThought").value,
    emotions: document.getElementById("emotions").value,
    time: new Date().toLocaleString()
  };

  let data = JSON.parse(localStorage.getItem("abcEntries") || "[]");
  data.unshift(entry);
  localStorage.setItem("abcEntries", JSON.stringify(data));

  render();
  clearFields();
}

function clearFields() {
  document.querySelectorAll("input, textarea").forEach(el => el.value = "");
}

function render() {
  const box = document.getElementById("entries");
  const data = JSON.parse(localStorage.getItem("abcEntries") || "[]");

  box.innerHTML = data.map(d => `
    <div class="entry">
      <strong>${d.date || "No date"}</strong><br>
      ${d.situation || ""}<br>
      <em>${d.hotThought || ""}</em>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
