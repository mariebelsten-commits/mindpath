<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prediction vs Outcome — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
  min-height: 90px;
}

textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.card {
  background: #ffffff;
  border: 1px solid #c5dfd0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.card h3 {
  margin: 0 0 6px;
  color: #0d4a2e;
  font-size: 1rem;
}

.card p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

<h1>🔍 Prediction vs Outcome</h1>

<p>
Test anxious predictions against reality. This helps weaken unhelpful beliefs by comparing expectation with evidence.
</p>

<div class="section">
  <label>Situation</label>
  <textarea id="situation" placeholder="What situation are you predicting about or testing?"></textarea>
</div>

<div class="section">
  <label>Prediction</label>
  <textarea id="prediction" placeholder="What do you think will happen? Be specific."></textarea>
</div>

<div class="section">
  <label>How strongly do you believe this prediction? (0–100)</label>
  <input type="number" id="belief" min="0" max="100" placeholder="e.g. 80"/>
</div>

<div class="card">
  <h3>🧪 Later… after the event</h3>
  <p>Return here once the outcome has happened.</p>
</div>

<div class="section">
  <label>What actually happened?</label>
  <textarea id="outcome" placeholder="Describe the real outcome objectively"></textarea>
</div>

<div class="section">
  <label>What was different from your prediction?</label>
  <textarea id="difference" placeholder="Compare prediction vs reality"></textarea>
</div>

  <div class="section">
  <label>How strongly do you still believe your prediction after the event? (0–100)</label>

  <div class="slider-wrap">
    <div class="slider-row">
      <input type="range" id="postBelief" min="0" max="100" value="50">
      <div class="rating-pill" id="postBeliefDisplay">50%</div>
    </div>

    <div class="slider-labels">
      <span>0% — Not at all</span>
      <span>50% — Partially</span>
      <span>100% — Fully convinced</span>
    </div>
  </div>

  <input type="hidden" id="postBeliefValue" value="50">
</div>
  
<div class="section">
  <label>What did you learn from this?</label>
  <textarea id="learning" placeholder="What does this tell you about your thinking patterns?"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Prediction vs Outcome",
    date: new Date().toISOString(),

    situation: document.getElementById('situation').value,
    prediction: document.getElementById('prediction').value,
    belief: document.getElementById('belief').value,
    outcome: document.getElementById('outcome').value,
    difference: document.getElementById('difference').value,
    postBelief: document.getElementById('postBeliefValue').value,
    learning: document.getElementById('learning').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
  document.getElementById('postBelief').addEventListener('input', function () {
  document.getElementById('postBeliefDisplay').textContent = this.value + '%';
  document.getElementById('postBeliefValue').value = this.value;
});
  
</script>

</body>
</html>
