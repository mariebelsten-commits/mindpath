<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visualising Calmness — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
  min-height: 90px;
}

textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.card {
  background: #ffffff;
  border: 1px solid #c5dfd0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.card h3 {
  margin: 0 0 6px;
  color: #0d4a2e;
  font-size: 1rem;
}

.card p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 Visualising Calmness</h1>

<p>
Use guided imagery to create a mental “safe space” you can return to when stress or anxiety rises.
</p>

<div class="section">
  <label>What situation are you feeling stressed or unsettled about?</label>
  <textarea id="situation" placeholder="Current trigger or stressor"></textarea>
</div>

<div class="section">
  <label>Choose a calming place to visualise</label>
  <textarea id="place" placeholder="Real or imagined (beach, forest, room, memory, etc.)"></textarea>
</div>

<div class="section">
  <label>What do you see?</label>
  <textarea id="see" placeholder="Colours, shapes, environment, movement"></textarea>
</div>

<div class="section">
  <label>What do you hear?</label>
  <textarea id="hear" placeholder="Sounds, silence, rhythm, nature, voices"></textarea>
</div>

<div class="section">
  <label>What do you feel physically?</label>
  <textarea id="feel" placeholder="Warmth, breeze, support under you, relaxation, etc."></textarea>
</div>

<div class="section">
  <label>What emotion do you notice as you stay in this image?</label>
  <textarea id="emotion" placeholder="Calm, safe, grounded, etc."></textarea>
</div>

<div class="section">
  <label>How can you return to this image in future?</label>
  <textarea id="return" placeholder="Cue words, breathing, reminder, routine"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Visualising Calmness",
    date: new Date().toISOString(),

    situation: document.getElementById('situation').value,
    place: document.getElementById('place').value,
    see: document.getElementById('see').value,
    hear: document.getElementById('hear').value,
    feel: document.getElementById('feel').value,
    emotion: document.getElementById('emotion').value,
    return: document.getElementById('return').value
  };
saveToServer(data);
  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>
<script src="/js/save.js"></script>
</body>
</html>
