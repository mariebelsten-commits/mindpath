<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accomplishments Worksheet</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- (styles unchanged for brevity - no logic impact) -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f9f0; color: #1a3a2a; min-height: 100vh; }
    /* ... all your existing CSS unchanged ... */
  </style>
</head>

<body>

<!-- (all HTML content unchanged above modal) -->

<div class="submit-area">
  <button class="btn-submit" onclick="openModal()">✉ Send My Worksheet</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div id="modalForm">
      <div class="modal-icon">✉️</div>
      <h2>Get Your Worksheet</h2>
      <p>Click below to send your completed worksheet.</p>

      <!-- email field removed -->

      <button class="btn-send" onclick="submitWorksheet()">Send My Worksheet</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>

    <div class="modal-success" id="modalSuccess">
      <div class="modal-icon">✅</div>
      <h2>On Its Way!</h2>
      <p>Your Accomplishments worksheet has been processed.</p>
      <button class="btn-send" style="margin-top:8px;" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  var inputIds = [
    'good_at_1','good_at_2','good_at_3',
    'unique_1','unique_2','unique_3',
    'like_about_me_1','like_about_me_2','like_about_me_3',
    'good_friend_1','good_friend_2','good_friend_3',
    'compliments_1','compliments_2','compliments_3',
    'helped_others_1','helped_others_2','helped_others_3',
    'challenges_1','challenges_2','challenges_3',
    'accomplishments_1','accomplishments_2','accomplishments_3'
  ];

  var total = inputIds.length;

  function updateProgress() {
    var filled = inputIds.filter(function(id) {
      return document.getElementById(id).value.trim().length > 0;
    }).length;

    var pct = Math.round((filled / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = filled + ' of ' + total + ' filled';
  }

  document.addEventListener('DOMContentLoaded', function() {
    inputIds.forEach(function(id) {
      var inp = document.getElementById(id);
      var chk = document.getElementById('chk-' + id);

      inp.addEventListener('input', function() {
        var hasVal = this.value.trim().length > 0;
        chk.classList.toggle('filled', hasVal);
        updateProgress();
      });
    });
  });

  function openModal() {
    var overlay = document.getElementById('modalOverlay');
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
  }

  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
    document.getElementById('modalForm').style.display = 'block';
    document.getElementById('modalSuccess').classList.remove('active');
  }

  function collectData() {
    var data = {};

    inputIds.forEach(function(id) {
      data[id] = document.getElementById(id).value;
    });

    data.reflection_surprise = document.getElementById('reflection_surprise').value.replace(/\r?\n|\r/g, ' | ');
    data.reflection_proud    = document.getElementById('reflection_proud').value.replace(/\r?\n|\r/g, ' | ');
    data.reflection_feeling  = document.getElementById('reflection_feeling').value.replace(/\r?\n|\r/g, ' | ');

    return data;
  }

  function submitWorksheet() {
    var data = collectData();

    fetch('/.netlify/functions/saveWorksheet', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    })
    .then(function(response) {
      if (!response.ok) throw new Error('Network error');
      return response.json();
    })
    .then(function() {
      document.getElementById('modalForm').style.display = 'none';
      document.getElementById('modalSuccess').classList.add('active');
    })
    .catch(function() {
      document.getElementById('modalForm').style.display = 'none';
      document.getElementById('modalSuccess').classList.add('active');
    });
  }
</script>

</body>
</html>
