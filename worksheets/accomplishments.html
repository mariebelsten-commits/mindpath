<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Accomplishments — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 820px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  font-size: 1.8rem;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  min-height: 90px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  margin-bottom: 12px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  background: #f7fdf9;
}

textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.submit-btn {
  display: block;
  width: 100%;
  background: #0d4a2e;
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  margin-top: 10px;
}

.submit-btn:hover {
  background: #0a3a22;
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 Accomplishments</h1>

<p>
Use this worksheet to capture what you’ve achieved, however small. This helps retrain attention away from threat and towards evidence of competence and progress.
</p>

<textarea id="accomplishment1" placeholder="What did you do well recently?"></textarea>
<textarea id="accomplishment2" placeholder="A task you completed or handled better than expected"></textarea>
<textarea id="accomplishment3" placeholder="Something you got through even if it was difficult"></textarea>
<textarea id="accomplishment4" placeholder="A quality you showed (e.g. patience, resilience, effort)"></textarea>

<button class="submit-btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Accomplishments",
    date: new Date().toISOString(),

    accomplishment1: document.getElementById('accomplishment1').value,
    accomplishment2: document.getElementById('accomplishment2').value,
    accomplishment3: document.getElementById('accomplishment3').value,
    accomplishment4: document.getElementById('accomplishment4').value
  };
  saveToServer(data);

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>
<script src="/js/save.js"></script>

</body>
</html>
