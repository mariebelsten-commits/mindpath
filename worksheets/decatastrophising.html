<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Decatastrophising — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

textarea {
  min-height: 90px;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.section {
  margin-bottom: 18px;
}

.hint {
  font-size: 0.8rem;
  color: #6b8f7a;
  font-weight: 400;
}
</style>
</head>

<body>

<div class="container">

<h1>🌪️ Decatastrophising</h1>

<p>
Take your worst-case scenario and gently unpack it. Not to dismiss your concerns, but to restore proportion and clarity.
</p>

<div class="section">
  <label>What is the situation?</label>
  <textarea id="situation" placeholder="What are you worried about?"></textarea>
</div>

<div class="section">
  <label>Worst-case scenario</label>
  <textarea id="worst" placeholder="What is the absolute worst you think could happen?"></textarea>
</div>

<div class="section">
  <label>Most likely outcome</label>
  <textarea id="likely" placeholder="What is realistically most likely to happen?"></textarea>
</div>

<div class="section">
  <label>Best-case scenario</label>
  <textarea id="best" placeholder="What is the best possible outcome?"></textarea>
</div>

<div class="section">
  <label>If the worst did happen…</label>
  <textarea id="coping" placeholder="How would you cope or get through it?"></textarea>
</div>

<div class="section">
  <label>What would this mean in a year’s time?</label>
  <textarea id="perspective" placeholder="How important would this be long-term?"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Decatastrophising",
    date: new Date().toISOString(),

    situation: document.getElementById('situation').value,
    worst: document.getElementById('worst').value,
    likely: document.getElementById('likely').value,
    best: document.getElementById('best').value,
    coping: document.getElementById('coping').value,
    perspective: document.getElementById('perspective').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
