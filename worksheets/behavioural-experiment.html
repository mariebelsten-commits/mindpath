<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Behavioural Experiment — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

textarea {
  min-height: 95px;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.section {
  margin-bottom: 18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧪 Behavioural Experiment</h1>

<p>
Design a real-world test of your belief. This helps you move from prediction to evidence.
</p>

<div class="section">
  <label>Belief you are testing</label>
  <textarea id="belief" placeholder="What do you currently believe is true?"></textarea>
</div>

<div class="section">
  <label>Prediction</label>
  <textarea id="prediction" placeholder="What do you expect will happen if you test this belief?"></textarea>
</div>

<div class="section">
  <label>Experiment</label>
  <textarea id="experiment" placeholder="What specific action will you take?"></textarea>
</div>

<div class="section">
  <label>Outcome</label>
  <textarea id="outcome" placeholder="What actually happened?"></textarea>
</div>

<div class="section">
  <label>Learning</label>
  <textarea id="learning" placeholder="What did you discover from this experiment?"></textarea>
</div>

<div class="section">
  <label>New balanced belief</label>
  <textarea id="newBelief" placeholder="What is a more accurate or balanced conclusion?"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Behavioural Experiment",
    date: new Date().toISOString(),

    belief: document.getElementById('belief').value,
    prediction: document.getElementById('prediction').value,
    experiment: document.getElementById('experiment').value,
    outcome: document.getElementById('outcome').value,
    learning: document.getElementById('learning').value,
    newBelief: document.getElementById('newBelief').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
