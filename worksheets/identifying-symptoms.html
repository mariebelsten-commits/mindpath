<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Identifying Symptoms — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

textarea, input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

textarea {
  min-height: 90px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-bottom: 18px;
}

.card {
  background: #ffffff;
  border: 1px solid #c5dfd0;
  border-radius: 10px;
  padding: 14px;
}

.card h3 {
  margin: 0 0 6px;
  color: #0d4a2e;
  font-size: 1rem;
}

.card p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

<h1>📋 Identifying Symptoms</h1>

<p>
Track what you are experiencing across thoughts, feelings, physical sensations, and behaviours. This helps build clarity and pattern awareness.
</p>

<div class="section">
  <label>Current situation or trigger</label>
  <textarea id="trigger" placeholder="What is happening or has just happened?"></textarea>
</div>

<div class="grid">

  <div class="card">
    <h3>🧠 Thoughts</h3>
    <textarea id="thoughts" placeholder="What thoughts are going through your mind?"></textarea>
  </div>

  <div class="card">
    <h3>💓 Physical sensations</h3>
    <textarea id="physical" placeholder="Body symptoms (tight chest, fatigue, tension, etc.)"></textarea>
  </div>

  <div class="card">
    <h3>😟 Emotions</h3>
    <textarea id="emotions" placeholder="Anxiety, sadness, anger, numbness, etc."></textarea>
  </div>

  <div class="card">
    <h3>⚡ Behaviours</h3>
    <textarea id="behaviours" placeholder="What did you do or feel compelled to do?"></textarea>
  </div>

</div>

<div class="section">
  <label>Intensity of distress (0–100)</label>
  <input type="number" id="intensity" min="0" max="100" placeholder="e.g. 70"/>
</div>

<div class="section">
  <label>What pattern do you notice?</label>
  <textarea id="pattern" placeholder="Any links between thoughts, feelings, body, and behaviour?"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Identifying Symptoms",
    date: new Date().toISOString(),

    trigger: document.getElementById('trigger').value,
    thoughts: document.getElementById('thoughts').value,
    physical: document.getElementById('physical').value,
    emotions: document.getElementById('emotions').value,
    behaviours: document.getElementById('behaviours').value,
    intensity: document.getElementById('intensity').value,
    pattern: document.getElementById('pattern').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
