<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Behavioural Activation Diary — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 820px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

textarea, input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
}

textarea:focus, input:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.section {
  margin-bottom: 18px;
}

label {
  font-weight: 600;
  font-size: 0.9rem;
  display: block;
  margin-bottom: 6px;
  color: #0d4a2e;
}
</style>
</head>

<body>

<div class="container">

<h1>🌱 Behavioural Activation Diary</h1>
<p>Track activity, mood, and energy to spot patterns and gently rebuild momentum.</p>

<div class="section">
  <label>Date</label>
  <input type="date" id="date">
</div>

<div class="section">
  <label>Activity</label>
  <textarea id="activity" placeholder="What did you do?"></textarea>
</div>

<div class="section">
  <label>Mood before (0–10)</label>
  <input type="number" id="moodBefore" min="0" max="10">
</div>

<div class="section">
  <label>Mood after (0–10)</label>
  <input type="number" id="moodAfter" min="0" max="10">
</div>

<div class="section">
  <label>Energy level</label>
  <input type="number" id="energy" min="0" max="10">
</div>

<div class="section">
  <label>Notes</label>
  <textarea id="notes" placeholder="What did you notice?"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Behavioural Activation Diary",
    date: new Date().toISOString(),

    activityDate: document.getElementById('date').value,
    activity: document.getElementById('activity').value,
    moodBefore: document.getElementById('moodBefore').value,
    moodAfter: document.getElementById('moodAfter').value,
    energy: document.getElementById('energy').value,
    notes: document.getElementById('notes').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
