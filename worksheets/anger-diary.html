<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anger Diary — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 820px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  font-size: 1.8rem;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 20px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

textarea {
  min-height: 90px;
}

.submit-btn {
  display: block;
  width: 100%;
  background: #0d4a2e;
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  margin-top: 10px;
}

.submit-btn:hover {
  background: #0a3a22;
}
</style>
</head>

<body>

<div class="container">

<h1>😡 Anger Diary</h1>

<p>
Use this worksheet to understand what triggers your anger, how it builds, and what thoughts sit underneath it. The aim is awareness first — not judgement.
</p>

<label>Situation</label>
<textarea id="situation" placeholder="What happened? Where were you? Who was involved?"></textarea>

<label>Trigger thoughts</label>
<textarea id="triggerThoughts" placeholder="What went through your mind in the moment?"></textarea>

<label>Intensity of anger (0–10)</label>
<input id="intensity" type="number" min="0" max="10"/>

<label>Physical sensations</label>
<textarea id="physical" placeholder="What did you notice in your body?"></textarea>

<label>What did you do?</label>
<textarea id="behaviour" placeholder="How did you respond? What actions did you take?"></textarea>

<label>What would have helped?</label>
<textarea id="alternative" placeholder="If you could rewind, what might you try instead?"></textarea>

<button class="submit-btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Anger Diary",
    date: new Date().toISOString(),

    situation: document.getElementById('situation').value,
    triggerThoughts: document.getElementById('triggerThoughts').value,
    intensity: document.getElementById('intensity').value,
    physical: document.getElementById('physical').value,
    behaviour: document.getElementById('behaviour').value,
    alternative: document.getElementById('alternative').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
