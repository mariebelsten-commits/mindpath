<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Triggers, Themes & Cues — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
  min-height: 90px;
}

textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.card {
  background: #ffffff;
  border: 1px solid #c5dfd0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}

.card h3 {
  margin: 0 0 6px;
  color: #0d4a2e;
  font-size: 1rem;
}

.card p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

<h1>🧩 Triggers, Themes & Cues</h1>

<p>
Identify repeating emotional patterns so you can recognise them earlier and respond more effectively next time.
</p>

<div class="section">
  <label>Recent difficult situation</label>
  <textarea id="situation" placeholder="What happened?"></textarea>
</div>

<div class="section">
  <label>What triggered the reaction?</label>
  <textarea id="trigger" placeholder="External event or internal thought"></textarea>
</div>

<div class="section">
  <label>What emotions showed up?</label>
  <textarea id="emotions" placeholder="Anxiety, anger, shame, sadness, etc."></textarea>
</div>

<div class="section">
  <label>What thoughts came up automatically?</label>
  <textarea id="thoughts" placeholder="Instant interpretations or predictions"></textarea>
</div>

<div class="section">
  <label>What body sensations or cues did you notice?</label>
  <textarea id="body" placeholder="Tension, heat, tight chest, restlessness, etc."></textarea>
</div>

<div class="section">
  <label>Do you notice a repeating theme?</label>
  <textarea id="theme" placeholder="E.g. fear of rejection, not being good enough, loss of control"></textarea>
</div>

<div class="section">
  <label>What could help you spot this earlier next time?</label>
  <textarea id="early" placeholder="Early warning signs or patterns"></textarea>
</div>

<div class="section">
  <label>What would a helpful response look like?</label>
  <textarea id="response" placeholder="More balanced or skillful reaction"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Triggers Themes Cues",
    date: new Date().toISOString(),

    situation: document.getElementById('situation').value,
    trigger: document.getElementById('trigger').value,
    emotions: document.getElementById('emotions').value,
    thoughts: document.getElementById('thoughts').value,
    body: document.getElementById('body').value,
    theme: document.getElementById('theme').value,
    early: document.getElementById('early').value,
    response: document.getElementById('response').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
