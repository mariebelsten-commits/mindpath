<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cognitive Distortions — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  min-height: 90px;
  margin-bottom: 12px;
}

textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.distortion-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-bottom: 18px;
}

.card {
  background: #ffffff;
  border: 1px solid #c5dfd0;
  border-radius: 10px;
  padding: 14px;
}

.card h3 {
  margin: 0 0 6px;
  color: #0d4a2e;
  font-size: 1rem;
}

.card p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 Identifying Cognitive Distortions</h1>

<p>
Cognitive distortions are mental shortcuts that exaggerate, misinterpret, or simplify reality in unhelpful ways. Use this worksheet to spot them in your thinking.
</p>

<div class="section">
  <label>Describe a recent upsetting thought</label>
  <textarea id="thought" placeholder="What went through your mind?"></textarea>
</div>

<div class="section">
  <label>What emotion did it trigger?</label>
  <textarea id="emotion" placeholder="Anxiety, sadness, anger, shame, etc."></textarea>
</div>

<div class="section">
  <label><strong>Select all cognitive distortions that apply</strong></label>

  <label><input type="checkbox" id="cd_all_or_nothing"> All-or-Nothing Thinking</label><br>
  <label><input type="checkbox" id="cd_catastrophising"> Catastrophising</label><br>
  <label><input type="checkbox" id="cd_mind_reading"> Mind Reading</label><br>
  <label><input type="checkbox" id="cd_overgeneralisation"> Overgeneralisation</label><br>
  <label><input type="checkbox" id="cd_personalisation"> Personalisation</label><br>
  <label><input type="checkbox" id="cd_emotional_reasoning"> Emotional Reasoning</label><br>
  <label><input type="checkbox" id="cd_mental_filter"> Mental Filter</label><br>
  <label><input type="checkbox" id="cd_disqualifying_positive"> Disqualifying the Positive</label><br>
  <label><input type="checkbox" id="cd_jumping_to_conclusions"> Jumping to Conclusions</label><br>
  <label><input type="checkbox" id="cd_fortune_telling"> Fortune Telling</label><br>
  <label><input type="checkbox" id="cd_should_statements"> Should Statements</label><br>
  <label><input type="checkbox" id="cd_labelling"> Labelling</label><br>

</div>

<div class="section">
  <label>What is a more balanced interpretation?</label>
  <textarea id="balanced" placeholder="A fairer, more realistic view"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "Cognitive Distortions",
    date: new Date().toISOString(),

    thought: document.getElementById('thought').value,
    emotion: document.getElementById('emotion').value,
    distortions: document.getElementById('distortions').value,
    balanced: document.getElementById('balanced').value
  };

  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>

</body>
</html>
