<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5-4-3-2-1 Grounding — MindPath</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f2f8f4;
  margin: 0;
  color: #1a1a1a;
}

.container {
  max-width: 860px;
  margin: 40px auto;
  padding: 20px;
}

h1 {
  color: #0d4a2e;
  margin-bottom: 10px;
}

p {
  color: #444;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 18px;
}

label {
  display: block;
  font-weight: 600;
  margin: 10px 0 6px;
  color: #0d4a2e;
  font-size: 0.9rem;
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #c5dfd0;
  font-family: inherit;
  font-size: 0.95rem;
  background: #f7fdf9;
  margin-bottom: 12px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0d4a2e;
  background: #fff;
}

textarea {
  min-height: 80px;
}

.btn {
  width: 100%;
  padding: 14px;
  background: #0d4a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

.btn:hover {
  background: #0a3a22;
}

.step-box {
  background: #ffffff;
  border: 1px solid #c5dfd0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
}

.step-box h3 {
  margin: 0 0 6px;
  color: #0d4a2e;
  font-size: 1rem;
}

.step-box p {
  margin: 0;
  font-size: 0.9rem;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 5-4-3-2-1 Grounding</h1>

<p>
A quick sensory reset technique to bring attention out of anxious thoughts and back into the present moment.
</p>

<div class="step-box">
  <h3>5 — See</h3>
  <textarea id="see5" placeholder="List 5 things you can see around you..."></textarea>
</div>

<div class="step-box">
  <h3>4 — Feel</h3>
  <textarea id="feel4" placeholder="List 4 things you can physically feel..."></textarea>
</div>

<div class="step-box">
  <h3>3 — Hear</h3>
  <textarea id="hear3" placeholder="List 3 things you can hear..."></textarea>
</div>

<div class="step-box">
  <h3>2 — Smell</h3>
  <textarea id="smell2" placeholder="List 2 things you can smell..."></textarea>
</div>

<div class="step-box">
  <h3>1 — Taste</h3>
  <textarea id="taste1" placeholder="List 1 thing you can taste..."></textarea>
</div>

<div class="section">
  <label>What was your emotional state before doing this?</label>
  <textarea id="before" placeholder="Anxiety, overwhelm, dissociation, etc."></textarea>
</div>

<div class="section">
  <label>What is your emotional state now?</label>
  <textarea id="after" placeholder="What has shifted after grounding?"></textarea>
</div>

<div class="section">
  <label>When could you use this again?</label>
  <textarea id="use" placeholder="Future triggers or situations"></textarea>
</div>

<button class="btn" onclick="saveWorksheet()">💾 Save To My Worksheets</button>

</div>

<script>
function saveWorksheet() {

  const data = {
    type: "5-4-3-2-1 Grounding",
    date: new Date().toISOString(),

    before: document.getElementById('before').value,
    after: document.getElementById('after').value,
    use: document.getElementById('use').value
  };
saveToServer(data);
  let worksheets = JSON.parse(localStorage.getItem('worksheets') || "[]");
  worksheets.push(data);
  localStorage.setItem('worksheets', JSON.stringify(worksheets));

  alert("Saved to My Worksheets ✅");
}
</script>
<script src="/js/save.js"></script>
</body>
</html>
