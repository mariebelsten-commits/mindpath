<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overcoming Avoidance</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- jsPDF for client-side PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ====== YOUR ORIGINAL STYLES (UNCHANGED) ====== */
body { font-family: 'Inter', sans-serif; background:#f0f9f0; color:#1a1a1a; line-height:1.6; }
h1,h2,h3,h4 { font-family:'Montserrat',sans-serif; }

textarea,input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:2px solid #c3e6cb;
  font-family:Inter;
}

/* (rest of your CSS unchanged for brevity) */
</style>
</head>

<body>

<!-- ================= YOUR ENTIRE HTML CONTENT UNCHANGED ================= -->
<!-- (I have NOT rewritten your worksheet UI — it remains identical) -->

<section class="submit-area">
  <button id="submitAvoidance">Download my worksheet PDF</button>
</section>

<script>
/* =========================================================
   🧠 WORKSHEET ENGINE (Reusable Core System)
========================================================= */

const STORAGE_KEY = "avoidance_worksheet_v1";

/* All fields in one registry = reusable engine */
const FIELDS = [
  "anxiety_trigger","anxiety_thoughts","anxiety_physical","anxiety_feelings",
  "avoidance_how","relief_temp","relief_cost","intensification",
  "costs_thoughts","costs_feelings","costs_sensations","costs_memories",
  "costs_distraction","costs_opting_out","costs_thinking_other",
  "costs_substances","costs_anything_else","costs_longterm",
  "costs_meaningful","costs_actual","face_find","face_action",
  "face_coping","face_evaluate","avoidanceEmail"
];

/* checkbox group handled separately */
const CHECKBOXES = [
  "cb_worrying","cb_dwelling","cb_fantasizing","cb_escape","cb_revenge",
  "cb_notfair","cb_ifonly","cb_blame_self","cb_blame_others","cb_blame_world",
  "cb_talk_logical","cb_talk_positive","cb_talk_negative",
  "cb_analyze_self","cb_analyze_sit","cb_analyze_others"
];

/* =========================================================
   💾 AUTO SAVE SYSTEM
========================================================= */

function saveState() {
  const data = {};

  FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) data[id] = el.value;
  });

  data.checkboxes = CHECKBOXES.filter(id => document.getElementById(id)?.checked);

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadState() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

  FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (el && saved[id]) el.value = saved[id];
  });

  (saved.checkboxes || []).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.checked = true;
  });
}

/* autosave binding */
document.addEventListener("input", saveState);

/* restore on load */
window.addEventListener("load", loadState);

/* =========================================================
   📄 PDF GENERATION (CLIENT SIDE)
========================================================= */

function collectData() {
  const data = {};

  FIELDS.forEach(id => {
    const el = document.getElementById(id);
    data[id] = el ? el.value : "";
  });

  data.checkboxes = CHECKBOXES
    .filter(id => document.getElementById(id)?.checked)
    .map(id => document.getElementById(id).value);

  return data;
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const data = collectData();

  let y = 10;

  doc.setFont("helvetica","bold");
  doc.text("Overcoming Avoidance Worksheet", 10, y);
  y += 10;

  doc.setFont("helvetica","normal");

  Object.entries(data).forEach(([key, value]) => {
    if (!value) return;

    const text = `${key}: ${Array.isArray(value) ? value.join(", ") : value}`;

    const lines = doc.splitTextToSize(text, 180);
    doc.text(lines, 10, y);
    y += lines.length * 6;

    if (y > 280) {
      doc.addPage();
      y = 10;
    }
  });

  doc.save("overcoming-avoidance-worksheet.pdf");
}

/* =========================================================
   🎛️ UI ACTIONS
========================================================= */

document.getElementById("submitAvoidance").addEventListener("click", generatePDF);

/* optional: clear function for reuse */
function resetWorksheet() {
  localStorage.removeItem(STORAGE_KEY);
}
</script>

</body>
</html>
