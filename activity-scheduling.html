<!-- OPTIONAL NETLIFY HOOK (not currently used, but future-ready) -->
<script>
  /**
   * Future hook if you ever want to:
   * - save scroll completion
   * - track engagement
   * - or convert this into an interactive worksheet
   */
  function sendActivityPageEvent(eventType) {
    fetch('/.netlify/functions/saveWorksheet', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        type: 'activity_scheduling_page',
        event: eventType,
        timestamp: new Date().toISOString()
      })
    }).catch(function(err) {
      console.log('Tracking disabled or failed:', err);
    });
  }

  // Example optional trigger:

</script>
